services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense_tracker
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://expense:expense@db:5432/expense_tracker
      SECRET_KEY: change-me
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  db-data:
